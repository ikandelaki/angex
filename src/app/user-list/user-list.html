<div class="user-list-container">
  <div class="user-list-header">
    <h2>Messages</h2>
    <button class="new-chat-btn" aria-label="Start new chat">+</button>
  </div>

  <div class="user-search">
    <input type="text" placeholder="Search users..." />
  </div>

  <div class="user-list">
    @for (user of users; track user.id) {
      <div class="user-item" [class.active]="user.id === 1">
        <div class="user-avatar">
          {{ user.avatar }}
        </div>
        <div class="user-info">
          <div class="user-name">{{ user.name }}</div>
          <div class="user-status" [class]="'status-' + user.status">
            {{ user.status }}
          </div>
        </div>
        <div class="user-status-indicator" [class]="'indicator-' + user.status"></div>
      </div>
    }
  </div>
</div>
